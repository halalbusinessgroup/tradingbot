events {}

http {
    upstream backend  { server backend:8000; }
    upstream frontend { server frontend:3000; }

    # Cloudflare handles SSL termination — nginx only needs HTTP:80
    server {
        listen 80;
        server_name mytradingbot.com www.mytradingbot.com tradingbot.halalbusiness.group;

        client_max_body_size 5M;

        # ── AI streaming endpoint (SSE) ──────────────────────────────────────
        location /api/ai/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

            # SSE: disable buffering so chunks reach the browser immediately
            proxy_buffering           off;
            proxy_cache               off;
            proxy_http_version        1.1;
            proxy_set_header          Connection '';
            proxy_read_timeout        300s;
            proxy_connect_timeout     10s;
            chunked_transfer_encoding on;
        }

        # ── All other API endpoints ───────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
            proxy_read_timeout 60s;
        }

        # ── Frontend ──────────────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
